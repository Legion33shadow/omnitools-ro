<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#0f0f1a;color:#e0e0ff;min-height:100vh}

input[type=number],input[type=text],textarea{width:100%;padding:.7rem;background:#0f0f1a;border:1px solid #333;border-radius:8px;color:#e0e0ff;font-size:1rem}
input[type=range]{width:100%;accent-color:#1a5c32;margin:.3rem 0}

<body>
<header>
  <a class="back" href="../">← OmniTools 🇷🇴 Romania</a>
  <h1>Calculator Ipotecă 2026</h1>
  <p style="color:#888;font-size:.85rem">calculator ipoteca imobiliara · Mis à jour 2026</p>
</header>
<div class="ad-slot">
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-MISSING" data-ad-slot="1111111111" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>
<div class="main">

<div class="tool-box">
<label>Montant (lei)</label>
<input type="number" id="t1" value="100000" oninput="calc()">
<label>Taux annuel (%) : <span id="t2v">3.5%</span></label>
<input type="range" id="t2" min="0.5" max="20" step="0.1" value="3.5" oninput="calc()">
<label>Durée (mois) : <span id="t3v">120</span></label>
<input type="range" id="t3" min="12" max="360" step="12" value="120" oninput="calc()">
<div class="results" id="res"></div>
</div>
</div>
<div class="ad-slot">
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-MISSING" data-ad-slot="2222222222" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>
<footer>© 2026 Calculator Ipotecă 2026 · OmniTools Romania</footer>
<script>
const fmt=n=>new Intl.NumberFormat('fr',{maximumFractionDigits:0}).format(n);
function calc(){
  const P=+document.getElementById('t1').value||0;
  const r=+document.getElementById('t2').value/100/12;
  const n=+document.getElementById('t3').value;
  document.getElementById('t2v').textContent=(r*12*100).toFixed(1)+'%';
  document.getElementById('t3v').textContent=n+' mois';
  const emi=r===0?P/n:P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
  document.getElementById('res').innerHTML=`
    <div class="stat"><small>Mensualité</small><strong>${fmt(emi)} lei</strong></div>
    <div class="stat"><small>Total remboursé</small><strong>${fmt(emi*n)} lei</strong></div>
    <div class="stat"><small>Intérêts totaux</small><strong>${fmt(emi*n-P)} lei</strong></div>
  `;
}
window.onload=calc;
</script>
</body>
