<script>
const fmt=n=>new Intl.NumberFormat('fr',{maximumFractionDigits:0}).format(n);
function calc(){
  const g=+document.getElementById('t1').value||0;
  const r=+document.getElementById('t2').value;
  document.getElementById('t2v').textContent=r+'%';
  const tax=g*r/100;
  document.getElementById('res').innerHTML=`
    <div class="stat"><small>Impôt estimé</small><strong>${fmt(tax)} lei</strong></div>
    <div class="stat"><small>Revenu net</small><strong>${fmt(g-tax)} lei</strong></div>
    <div class="stat"><small>Taux effectif</small><strong>${r}%</strong></div>
  `;
}
window.onload=calc;
</script>
