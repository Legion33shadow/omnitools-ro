<script>
const fmt=n=>new Intl.NumberFormat('fr',{maximumFractionDigits:0}).format(n);
async function conv(){
  const a=+document.getElementById('t1').value, f=document.getElementById('t2').value, t=document.getElementById('t3').value;
  try{
    const r=await fetch(`https://open.er-api.com/v6/latest/${f}`);
    const d=await r.json();
    if(d.result==='success') document.getElementById('convRes').textContent=`${(a*d.rates[t]).toFixed(2)} ${t}`;
  }catch(e){document.getElementById('convRes').textContent='Network error';}
}
function calc(){conv();}
